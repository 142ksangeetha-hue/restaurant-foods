<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Foods</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Recipes</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    <section id="home">
        <h1>Welcome to Food Website</h1>
    </section>


    <!-- Recipe Cards -->
    <section class="recipes">

        <div class="card">
            <img src="images/chicken.jpg" alt="chicken">
            <div class="card-content">
                <h3>Delicious Spicy Chicken Recipe</h3>
                <button>Order Now</button>
            </div>
        </div>

        <div class="card">
            <img src="images/beef curry.jpg" alt="beef curry">
            <div class="card-content">
                <h3>Tender and Flavorful Beef Curry With Rice</h3>
                <button>Order Now</button>
            </div>
        </div>

        <div class="card">
            <img src="images/prawn.jpg" alt="prawn curry">
            <div class="card-content">
                <h3>Hearty Prawn pot roast served with rich gravy.</h3>
                <button>Order Now</button>
            </div>
        </div>

        <div class="card">
            <img src="images/fish curry.jpg" alt="fish curry">
            <div class="card-content">
                <h3>Super Masala Fish Curry With Kerela Style</h3>
                <button>Order Now</button>
            </div>
        </div>

    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact-section">
        <h1>Contact Us</h1>

        <form>
            <div class="input-group">
                <label>Name:</label>
                <input type="text" placeholder="Enter the name">
            </div>

            <div class="input-group">
                <label>Age:</label>
                <input type="number" placeholder="Enter the age">
            </div>

            <div class="input-group">
                <label>Email:</label>
                <input type="email" placeholder="Enter the email">
            </div>

            <button type="submit" class="send-btn">Send</button>
        </form>
    </section>

</body>

</html>
